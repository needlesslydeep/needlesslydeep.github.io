<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <meta name="description"
        content="{{ page.description | default: site.description }}">

  <meta name="author" content="Needlessly Deep">

  <meta name="robots" content="index,follow">

  <meta name="theme-color" content="#f7f3ec">

  <link rel="canonical"
        href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:type"
        content="{% if page.layout == 'paper' %}article{% else %}website{% endif %}">

  <meta property="og:site_name"
        content="{{ site.title }}">

  <meta property="og:title"
        content="{{ page.title | default: site.title }}">

  <meta property="og:description"
        content="{{ page.description | default: site.description }}">

  <meta property="og:url"
        content="{{ page.url | absolute_url }}">

  <meta property="og:image"
        content="{{ '/assets/images/hero.png' | absolute_url }}">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">

  <meta name="twitter:site" content="@NeedlesslyDeep">

  <meta name="twitter:title"
        content="{{ page.title | default: site.title }}">

  <meta name="twitter:description"
        content="{{ page.description | default: site.description }}">

  <meta name="twitter:image"
        content="{{ '/assets/images/hero.png' | absolute_url }}">

  <!-- Favicon -->
  <link rel="icon"
        type="image/png"
        href="{{ '/assets/images/favicon.png' | relative_url }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Libre+Baskerville:wght@400;700&display=swap"
        rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet"
        href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- MathJax -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>

<script
  id="MathJax-script"
  async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

  {% feed_meta %}

</head>

<body>

{{ content }}

</body>
</html>
