---
layout: default
---

<article class="paper-page">

    <header class="paper-header">

        <p class="paper-number">
            Paper {{ page.number }}
        </p>

        <h1>{{ page.title }}</h1>

        <p class="paper-meta">
            {{ page.fields }}

            {% if page.published %}
                · {{ page.published | date: "%B %-d, %Y" }}
            {% endif %}
        </p>

    </header>

    <div class="paper-content">

        {{ content }}

    </div>

</article>
